version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    groups:
      # Tout regroupé dans une PR hebdo unique (majeures incluses) pour
      # minimiser le bruit. Au moindre doute sur une majeure, fermer la PR
      # et la laisser remonter isolément la semaine suivante via `ignore`.
      all-deps:
        update-types:
          - "major"
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions:
        update-types:
          - "minor"
          - "patch"
