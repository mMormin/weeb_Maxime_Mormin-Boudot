version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    groups:
      # Minor + patch regroupés en une PR hebdo unique : quasi toujours
      # sans risque, à merger en bloc le lundi.
      safe-deps:
        update-types:
          - "minor"
          - "patch"
    # Les majeures ne sont volontairement dans aucun groupe : Dependabot
    # ouvrira une PR par paquet majeur, ce qui permet de traiter les
    # breaking changes un à un (eslint 10, vite 8, vitest 4, etc.).

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions:
        update-types:
          - "minor"
          - "patch"
