version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    groups:
      # Mineurs et patchs regroupés en une seule PR pour éviter le bruit ;
      # les majeures restent séparées car elles méritent une revue dédiée.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions:
        update-types:
          - "minor"
          - "patch"
