name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # Pas de `version` : pnpm/action-setup lit le champ `packageManager`
        # de package.json pour aligner CI, Vercel et la machine locale.
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        # On garde les optionalDependencies : Rollup et sharp publient leurs
        # binaires natifs via ce mécanisme, et pnpm n'installe que celui qui
        # correspond à la plateforme courante (Linux x64 ici).
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
